<h1>Relatórios</h1>

<a routerLink="/relatorios/cadastrar">Cadastrar Relatório</a>

<span>Qtd relatórios: <span>{{relatorios().length}}</span></span>

<table>
    <thead>
        <th>Título</th>
        <th>Tipo</th>
        <th>Valor total</th>
        <th>Data emissão</th>
        <th>Responsável</th>
        <th></th>
    </thead>
    <tbody>
        @for(relatorio of relatorios(); track relatorio.id){

            <tr>
                <td>{{relatorio.titulo}}</td>
                <td>{{relatorio.tipo}}</td>
                <td>{{relatorio.valorTotal}}</td>
                <td>{{relatorio.dataEmissao}}</td>
                <td>{{relatorio.responsavel}}</td>
                <td>
                    <a routerLink="/relatorios/editar/{{relatorio.id}}">Editar</a>
                    <button (click)="apagar(relatorio.id)">Apagar</button>
                </td>
            </tr>
        }
    </tbody>
</table>
