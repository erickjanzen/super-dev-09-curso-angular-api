<h1> Cadastrar Projeto </h1>

<label for="nome">Nome</label>
<input type="text" [(ngModel)]="projeto().nome" id="nome" placeholder="Digite o nome do projeto">
<div>
    <label for="codigo">Código do projeto</label>
    <input type="text" [(ngModel)]="projeto().codigoProjeto" id="codigo" placeholder="Digite o código do projeto">
</div>
<div>
    <label for="custo">Custo estimado</label>
    <input type="number" [(ngModel)]="projeto().custoEstimado" id="custo" placeholder="Digite o custo estimado">
</div>
<div>
    <button (click)="salvar()">Salvar</button>
</div>
